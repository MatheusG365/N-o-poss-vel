<head>

        margin: auto;
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);">
        <h2 style="color: #F1731F; text-align: center;">
            Sistema Nikola Tech
        </h2>

        <p style="font-size: 16px; color: #333; text-align: center;">Olá {{nome}}, <b>{{mensagem}}</b> 👋</p>

        </div>

        <p style="font-size: 15px; color: #555;">

        <p style="font-size: 13px; color: #999;">
